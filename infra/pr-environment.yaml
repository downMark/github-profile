  CandidateTrafficRollbackFunction:
    Type: AWS::Lambda::Function
    Condition: IsProduction
    Properties:
      FunctionName: !Sub '${ProjectName}-prod-candidate-traffic-rollback'
      Description: Restore the stable target group when the tagged candidate slot alarms.
      Runtime: python3.13
      Handler: index.handler
      Timeout: 30
      Role: !Ref TrafficRollbackRoleArn
      Environment:
        Variables:
          PROJECT_NAME: !Ref ProjectName
          ROUTES: !Sub |
            {"auth":{"rule":"${AuthListenerRule}","blue":"${AuthTargetGroup}","green":"${AuthGreenTargetGroup}"},"profile":{"rule":"${ProfileListenerRule}","blue":"${ProfileTargetGroup}","green":"${ProfileGreenTargetGroup}"},"todo":{"rule":"${TodoListenerRule}","blue":"${TodoTargetGroup}","green":"${TodoGreenTargetGroup}"}}
      Code:
        ZipFile: |
          import json
          import os
          import re
          import boto3

          elbv2 = boto3.client("elbv2")
          routes = json.loads(os.environ["ROUTES"])

          def handler(event, context):
              alarm_name = event["detail"]["alarmName"]
              pattern = rf"^{re.escape(os.environ['PROJECT_NAME'])}-prod-(auth|profile|todo)-(blue|green)-(?:5xx|unhealthy)$"
              match = re.match(pattern, alarm_name)
              if not match:
                  return {"ignored": "unmanaged alarm"}
              service, alarmed_slot = match.groups()
              route = routes[service]
              tags = elbv2.describe_tags(ResourceArns=[route["rule"]])["TagDescriptions"][0].get("Tags", [])
              candidate = next((tag["Value"] for tag in tags if tag["Key"] == "CandidateSlot"), None)
              if candidate != alarmed_slot:
                  return {"ignored": "alarmed slot is not the candidate"}
              stable = "green" if candidate == "blue" else "blue"
              target_health = elbv2.describe_target_health(TargetGroupArn=route[stable])["TargetHealthDescriptions"]
              if not target_health or not all(item["TargetHealth"]["State"] == "healthy" for item in target_health):
                  return {"ignored": "previous stable slot is no longer healthy"}
              elbv2.modify_rule(RuleArn=route["rule"], Actions=[{
                  "Type": "forward",
                  "ForwardConfig": {
                      "TargetGroups": [
                          {"TargetGroupArn": route[stable], "Weight": 100},
                          {"TargetGroupArn": route[candidate], "Weight": 0}
                      ],
                      "TargetGroupStickinessConfig": {"Enabled": True, "DurationSeconds": 300}
                  }
              }])
              return {"rolled_back": service, "stable": stable, "candidate": candidate}

  CandidateAlarmEventRule:
    Type: AWS::Events::Rule
    Condition: IsProduction
    Properties:
      Description: Automatically restore stable traffic when a candidate target group alarms.
      EventPattern:
        source:
          - aws.cloudwatch
        detail-type:
          - CloudWatch Alarm State Change
        detail:
          state:
            value:
              - ALARM
          alarmName:
            - !Sub '${ProjectName}-prod-auth-blue-unhealthy'
            - !Sub '${ProjectName}-prod-auth-green-unhealthy'
            - !Sub '${ProjectName}-prod-profile-blue-unhealthy'
            - !Sub '${ProjectName}-prod-profile-green-unhealthy'
            - !Sub '${ProjectName}-prod-todo-blue-unhealthy'
            - !Sub '${ProjectName}-prod-todo-green-unhealthy'
            - !Sub '${ProjectName}-prod-auth-blue-5xx'
            - !Sub '${ProjectName}-prod-auth-green-5xx'
            - !Sub '${ProjectName}-prod-profile-blue-5xx'
            - !Sub '${ProjectName}-prod-profile-green-5xx'
            - !Sub '${ProjectName}-prod-todo-blue-5xx'
            - !Sub '${ProjectName}-prod-todo-green-5xx'
      Targets:
        - Arn: !GetAtt CandidateTrafficRollbackFunction.Arn
          Id: CandidateTrafficRollback

  AllowEventBridgeRollbackInvocation:
    Type: AWS::Lambda::Permission
    Condition: IsProduction
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref CandidateTrafficRollbackFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CandidateAlarmEventRule.Arn

