name: PR Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  id-token: write
  contents: read

concurrency:
  group: pr-environment-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-1
  AWS_ROLE_ARN: arn:aws:iam::688674375825:role/github-profile-github-actions-oidc-role
  ECR_REPOSITORY: github-profile-dev-backend

jobs:
  guard:
    name: Check PR guard
    uses: ./.github/workflows/pr-guard.yml
    with:
      head-ref: ${{ github.event.pull_request.head.ref }}
      head-repository: ${{ github.event.pull_request.head.repo.full_name }}
      repository: ${{ github.repository }}

  build-and-push:
    name: Build and push backend image
    needs: guard
    if: needs.guard.outputs.allowed == 'true' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare image metadata
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          SHORT_SHA="${HEAD_SHA:0:12}"
          IMAGE_TAG="pr-${PR_NUMBER}-${SHORT_SHA}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          echo "tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Build backend image
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
        run: docker build --pull --tag "${IMAGE_URI}" app/backend

      - name: Push backend image
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
        run: docker push "${IMAGE_URI}"

      - name: Publish build summary
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
        run: |
          {
            echo "### Backend image published"
            echo
            echo "\`${IMAGE_URI}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  cleanup:
    name: Record PR environment cleanup
    needs: guard
    if: needs.guard.outputs.allowed == 'true' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Record pending cleanup
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "PR ${PR_NUMBER} closed. ECS, ALB, Cloud Map, database schema, and Pages cleanup will be added in the deployment phase."
