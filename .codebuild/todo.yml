version: 0.2

phases:
  pre_build:
    commands:
      - test -n "${TODO_ECR_REPOSITORY}" && test -n "${IMAGE_TAG}"
      - REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - IMAGE_URI="${REGISTRY}/${TODO_ECR_REPOSITORY}:${IMAGE_TAG}"
      - aws ecr get-login-password | docker login --username AWS --password-stdin "${REGISTRY}"
  build:
    commands:
      - docker run --rm -v "${CODEBUILD_SRC_DIR}:/workspace" -w /workspace golang:1.24-bookworm bash -c 'apt-get update >/dev/null && apt-get install -y git protobuf-compiler >/dev/null && app/todo-service/scripts/generate-proto.sh && git diff --exit-code -- app/todo-service/internal/gen && cd app/todo-service && go test ./... && go vet ./...'
      - docker build --pull --file app/todo-service/Dockerfile --tag "${IMAGE_URI}" app
  post_build:
    commands:
      - docker push "${IMAGE_URI}"
