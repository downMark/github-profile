version: 0.2

phases:
  pre_build:
    commands:
      - test -n "${PROFILE_ECR_REPOSITORY}" && test -n "${IMAGE_TAG}"
      - REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - IMAGE_URI="${REGISTRY}/${PROFILE_ECR_REPOSITORY}:${IMAGE_TAG}"
      - aws ecr get-login-password | docker login --username AWS --password-stdin "${REGISTRY}"
  build:
    commands:
      - docker run --rm -v "${CODEBUILD_SRC_DIR}/app:/workspace" -w /workspace/backend rust:1.94-bookworm bash -c 'rustup component add rustfmt && cargo fmt --check && cargo test --locked'
      - docker build --pull --file app/backend/Dockerfile --tag "${IMAGE_URI}" app
  post_build:
    commands:
      - docker push "${IMAGE_URI}"
